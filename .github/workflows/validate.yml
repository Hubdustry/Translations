name: Validate Translations

on:
  pull_request:
    paths:
      - 'web/**'
      - 'bot/**'

jobs:
  validate:
    name: Validate Translation Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON syntax
        run: |
          echo "🔍 Validating JSON syntax..."
          errors=0
          for f in web/*.json bot/*.json; do
            if [ -f "$f" ]; then
              if ! node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" 2>/dev/null; then
                echo "❌ Invalid JSON: $f"
                errors=$((errors + 1))
              else
                echo "✅ Valid: $f"
              fi
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors file(s) have invalid JSON syntax"
            exit 1
          fi

      - name: Check missing keys
        run: node scripts/validate.js --check-missing

      - name: Validate placeholders
        run: node scripts/validate.js --check-placeholders

      - name: Check string lengths
        run: node scripts/validate.js --check-lengths
